version: "3.9"

services:
  bot:
    build: .
    restart: always
    env_file: .env
    ports:
      # YooKassa webhook server (only when WEBHOOK_HOST is set). Bound to
      # localhost — nginx on the host terminates TLS and proxies here.
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna_pass
      POSTGRES_DB: luna_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luna -d luna_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  redis_data:
